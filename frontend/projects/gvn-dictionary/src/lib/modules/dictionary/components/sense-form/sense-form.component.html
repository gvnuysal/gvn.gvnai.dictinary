<div class="inline-form">
  <h4>Yeni Anlam</h4>

  @if (errorMessage()) {
    <div class="error-message">{{ errorMessage() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="definition">Tanım</label>
      <textarea id="definition" formControlName="definition" rows="3" placeholder="Anlam tanımı"></textarea>
      @if (form.controls.definition.touched && form.controls.definition.invalid) {
        <span class="field-error">Tanım gereklidir.</span>
      }
    </div>

    <div class="form-group">
      <label for="definitionShort">Kısa Tanım</label>
      <input id="definitionShort" type="text" formControlName="definitionShort" placeholder="Opsiyonel kısa tanım" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="registerId">Kayıt (Register)</label>
        <select id="registerId" formControlName="registerId">
          <option value="">Seçiniz</option>
          @for (reg of registers(); track reg.id) {
            <option [value]="reg.id">{{ reg.name }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="domainId">Alan (Domain)</label>
        <select id="domainId" formControlName="domainId">
          <option value="">Seçiniz</option>
          @for (domain of domains(); track domain.id) {
            <option [value]="domain.id">{{ domain.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) { Kaydediliyor... } @else { Kaydet }
      </button>
      <button type="button" class="btn-cancel" (click)="onCancel()">İptal</button>
    </div>
  </form>
</div>
