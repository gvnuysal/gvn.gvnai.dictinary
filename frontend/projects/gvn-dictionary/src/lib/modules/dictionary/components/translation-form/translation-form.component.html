<div class="inline-form">
  <h4>Yeni Çeviri</h4>

  @if (errorMessage()) {
    <div class="error-message">{{ errorMessage() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label for="targetLanguageId">Hedef Dil</label>
        <select id="targetLanguageId" formControlName="targetLanguageId">
          <option value="" disabled>Dil seçin</option>
          @for (lang of languages(); track lang.id) {
            <option [value]="lang.id">{{ lang.name }} ({{ lang.code }})</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="equivalenceType">Eşdeğerlik</label>
        <select id="equivalenceType" formControlName="equivalenceType">
          @for (eq of equivalenceTypes; track eq.value) {
            <option [value]="eq.value">{{ eq.label }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="translationText">Çeviri Metni</label>
      <input id="translationText" type="text" formControlName="translationText" placeholder="Çeviriyi girin" />
      @if (form.controls.translationText.touched && form.controls.translationText.invalid) {
        <span class="field-error">Çeviri metni gereklidir.</span>
      }
    </div>

    <div class="form-group">
      <label for="confidenceScore">Güven Puanı (0-1)</label>
      <input
        id="confidenceScore"
        type="number"
        formControlName="confidenceScore"
        step="0.05"
        min="0"
        max="1"
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) { Kaydediliyor... } @else { Kaydet }
      </button>
      <button type="button" class="btn-cancel" (click)="onCancel()">İptal</button>
    </div>
  </form>
</div>
